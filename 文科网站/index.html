<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文科考试必背(｡･ω･｡)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
  :root{
    --bg:#fdf6fc;
    --card:#fff;
    --text:#222;
    --sub:#999;
    --dot:#f8e3f1;
    --main:#e89cb6;
    --light:#fce9f0;
  }
  [data-theme="dark"]{
    --bg:#1a161d;
    --card:#2a2430;
    --text:#eee;
    --sub:#bbb;
    --dot:#332a30;
    --main:#e89cb6;
    --light:#3d2f3a;
  }
  body{
    background:var(--bg);
    background-image: radial-gradient(var(--dot) 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--text);
    min-height:100vh;
    padding:20px;
    padding-bottom:60px;
  }
  .header{
    position:sticky;
    top:0;
    background:var(--card);
    padding:14px 16px;
    border-radius:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.04);
    margin-bottom:24px;
    z-index:10;
  }
  .bar{
    display:flex;
    gap:10px;
    margin-bottom:10px;
  }
  #search{
    flex:1;
    padding:10px 14px;
    border-radius:10px;
    border:1px solid var(--light);
    background:var(--card);
    color:var(--text);
    font-size:15px;
  }
  #themeBtn{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    background:var(--light);
    color:var(--text);
    font-weight:bold;
    white-space:nowrap;
  }
  .title{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin:6px 0;
  }
  .subjects{
    display:flex;
    flex-direction:column;
    gap:14px;
    max-width:400px;
    margin:0 auto;
  }
  .item{
    display:block;
    background:var(--card);
    border-radius:14px;
    padding:20px;
    text-align:center;
    font-size:17px;
    font-weight:bold;
    color:var(--text);
    text-decoration:none;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
    transition:0.2s;
  }
  .item:hover{opacity:.9}
  .history{border-left:4px solid var(--main)}
  .politic{border-left:4px solid var(--main)}
  .geo{border-left:4px solid var(--main)}

  /* 抽背模块 */
  .quiz-box{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    margin:30px auto 0;
    max-width:400px;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
  }
  .quiz-title{
    font-weight:bold;
    font-size:17px;
    text-align:center;
    margin-bottom:12px;
  }
  .quiz-row{
    display:flex;
    gap:8px;
    margin-bottom:12px;
  }
  .subject-select{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1px solid var(--light);
    background:var(--card);
    color:var(--text);
  }
  #randomBtn{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    background:var(--light);
    color:var(--text);
    font-weight:bold;
  }
  .result{
    padding:14px;
    background:var(--bg);
    border-radius:10px;
    min-height:60px;
    line-height:1.6;
    font-size:15px;
    white-space:pre-line;
    text-align:left;
    margin-bottom:8px;
  }
  .answer{
    padding:12px 14px;
    background:var(--light);
    border-radius:10px;
    font-size:15px;
    line-height:1.6;
    display:none;
    margin-bottom:8px;
  }
  .btn-row{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  .btn-row button{
    flex:1;
    padding:8px 10px;
    border-radius:8px;
    border:none;
    background:var(--light);
    color:var(--text);
    font-size:14px;
  }

  /* 统计 */
  .stats{
    background:var(--card);
    border-radius:14px;
    padding:16px;
    max-width:400px;
    margin:16px auto;
    text-align:center;
    font-size:15px;
    line-height:1.6;
  }

  /* 错题本 */
  .wrong-box{
    background:var(--card);
    border-radius:14px;
    padding:20px;
    max-width:400px;
    margin:20px auto;
    box-shadow:0 2px 6px rgba(0,0,0,0.04);
  }
  .wrong-title{
    font-weight:bold;
    text-align:center;
    margin-bottom:12px;
  }
  .wrong-list{
    max-height:220px;
    overflow-y:auto;
    font-size:14px;
    line-height:1.6;
    padding:6px;
  }
  .wrong-item{
    padding:8px;
    border-bottom:1px solid var(--light);
  }
  .clear-wrong{
    margin-top:10px;
    padding:8px 14px;
    border-radius:8px;
    border:none;
    background:var(--light);
    color:var(--text);
    width:100%;
  }

  /* 番茄钟 */
  .pomodoro{
    background:var(--card);
    border-radius:14px;
    padding:18px;
    max-width:400px;
    margin:20px auto;
    text-align:center;
  }
  .pomodoro h3{
    font-size:16px;
    margin-bottom:10px;
  }
  .timer{
    font-size:26px;
    font-weight:bold;
    margin:10px 0;
    color:var(--main);
  }
  .pomodoro button{
    padding:8px 14px;
    border-radius:8px;
    border:none;
    background:var(--light);
    color:var(--text);
    margin:0 4px;
  }

  .footer{
    text-align:center;
    font-size:12px;
    color:var(--sub);
    margin-top:40px;
    line-height:1.5;
  }
</style>
</head>

<body>

<div class="header">
  <div class="bar">
    <input type="text" id="search" placeholder="搜索科目…">
    <button id="themeBtn">夜间模式</button>
  </div>
  <div class="title">文科考试必背(｡･ω･｡)</div>
</div>

<div class="subjects">
  <a href="历史知识点.html" class="item history">📜 历史知识点</a>
  <a href="政治知识点.html" class="item politic">⚖️ 政治知识点</a>
  <a href="地理知识点.html" class="item geo">🌍 地理知识点</a>
</div>

<!-- 今日学习统计 -->
<div class="stats">
  📝 今日已刷题：<span id="total">0</span> 题 |
  ✅ 正确：<span id="correct">0</span> |
  ❌ 错误：<span id="wrong">0</span>
</div>

<!-- 随机抽背 -->
<div class="quiz-box">
  <div class="quiz-title">🎯 随机抽背生成器</div>
  <div class="quiz-row">
    <select class="subject-select" id="subject">
      <option value="history">历史</option>
      <option value="politic">政治</option>
      <option value="geo">地理</option>
    </select>
    <button id="randomBtn">随机出题</button>
  </div>

  <div class="result" id="result">请选择科目，点击随机出题开始抽背</div>
  <div class="answer" id="answer"></div>

  <div class="btn-row">
    <button id="toggleAns">显示答案</button>
    <button id="collectWrong">加入错题</button>
  </div>
  <div class="btn-row">
    <button id="markCorrect">我会了 ✅</button>
    <button id="markIncorrect">不会 ❌</button>
  </div>
</div>

<!-- 错题本 -->
<div class="wrong-box">
  <div class="wrong-title">📕 错题本</div>
  <div class="wrong-list" id="wrongList">暂无错题</div>
  <button class="clear-wrong" id="clearWrong">清空错题</button>
</div>

<!-- 番茄钟 -->
<div class="pomodoro">
  <h3>⏱️ 专注背诵番茄钟</h3>
  <div class="timer" id="timer">25:00</div>
  <button id="startTimer">开始</button>
  <button id="resetTimer">重置</button>
</div>

<div class="footer">
  本网站由@石龙子/yiyi独立制作<br>
  仅供学习交流参考，无任何盈利
</div>

<script>
// ====================== 题库（带答案）======================
const questions = {
  history: [
    { q: "鸦片战争爆发时间？主要影响？", a: "1840年；中国开始沦为半殖民地半封建社会，近代史开端。" },
    { q: "辛亥革命的意义与局限？", a: "推翻君主专制，使民主共和观念深入人心；但未改变社会性质，革命果实被窃取。" },
    { q: "五四运动导火线与历史地位？", a: "巴黎和会外交失败；新民主主义革命开端，工人阶级登上历史舞台。" },
    { q: "中共成立时间与意义？", a: "1921年；中国革命面貌焕然一新，有了坚强领导核心。" },
    { q: "抗战胜利原因与影响？", a: "全民族抗战、中共中流砥柱、国际援助；近代反帝完全胜利，提高国际地位。" },
    { q: "新中国成立的历史意义？", a: "推翻三座大山，人民当家作主，开启新纪元。" },
    { q: "三大改造时间与意义？", a: "1953-1956；标志社会主义制度在中国建立。" },
    { q: "分封制内容与影响？", a: "周王分封诸侯，诸侯效忠纳贡；巩固统治，但后期割据混战。" },
    { q: "科举制积极作用？", a: "打破特权垄断，扩大官吏来源，提高官员素质，加强中央集权。" },
    { q: "商鞅变法措施与影响？", a: "废井田、重农桑、军功爵、郡县制；使秦国富强，为统一奠基。" }
  ],
  politic: [
    { q: "我国国家性质及本质？", a: "人民民主专政的社会主义国家；本质是人民当家作主。" },
    { q: "新时代社会主要矛盾？", a: "人民日益增长的美好生活需要和不平衡不充分发展之间的矛盾。" },
    { q: "社会主义基本经济制度？", a: "公有制为主体多种所有制共同发展；按劳分配为主体多种分配并存；社会主义市场经济体制。" },
    { q: "实践与认识辩证关系？", a: "实践决定认识（来源、动力、标准、目的）；认识反作用于实践。" },
    { q: "新发展理念内涵？", a: "创新、协调、绿色、开放、共享。" },
    { q: "政府经济职能？", a: "宏观调控、市场监管、社会管理、公共服务、环保。" },
    { q: "公民民主决策途径与意义？", a: "社情民意、专家咨询、重大公示、社会听证；体现民主、促进科学实施。" },
    { q: "依法治国十六字方针？", a: "科学立法、严格执法、公正司法、全民守法。" },
    { q: "我国外交政策基本内容？", a: "独立自主和平外交；宗旨促和平发展；基本目标护主权促发展；准则和平共处五项原则。" },
    { q: "人民群众是历史创造者？", a: "物质财富、精神财富创造者，社会变革决定力量。" }
  ],
  geo: [
    { q: "热力环流形成原理？", a: "地面冷热不均→空气垂直运动→同一水平面气压差→水平运动→热力环流。" },
    { q: "东亚、南亚季风成因？", a: "东亚：海陆热力差异；南亚：海陆热力差异+气压带风带季节移动。" },
    { q: "洋流分布规律？", a: "中低纬北顺南逆；中高纬北逆南无；西风漂流寒流；北印度洋冬逆夏顺。" },
    { q: "农业自然区位因素？", a: "气候、地形、土壤、水源。" },
    { q: "城镇化问题？", a: "交通拥堵、住房紧张、污染、就业压力、社会秩序问题。" },
    { q: "水循环环节与意义？", a: "蒸发、降水、水汽输送、径流、下渗；维持水平衡、更新淡水、塑造地表。" },
    { q: "垂直自然带影响因素？", a: "纬度、海拔、坡向、相对高度。" },
    { q: "工业社会经济区位？", a: "市场、交通、原料、燃料、政策、劳动力、技术、地价。" },
    { q: "可持续发展内涵？", a: "生态持续发展是基础，经济是条件，社会是目的。" },
    { q: "人口迁移主要因素？", a: "经济、自然、政治、社会文化、交通通信。" }
  ]
};

// ====================== 全局状态 ======================
let currentQ = null;
let stats = { total: 0, correct: 0, wrong: 0 };
let wrongList = JSON.parse(localStorage.getItem("wrongList")) || [];

// ====================== 随机出题 ======================
document.getElementById("randomBtn").addEventListener("click", () => {
  const sub = document.getElementById("subject").value;
  const arr = questions[sub];
  currentQ = arr[Math.floor(Math.random() * arr.length)];
  document.getElementById("result").textContent = currentQ.q;
  document.getElementById("answer").style.display = "none";
  document.getElementById("toggleAns").textContent = "显示答案";
  stats.total++;
  updateStats();
});

// ====================== 显示/隐藏答案 ======================
document.getElementById("toggleAns").addEventListener("click", () => {
  if (!currentQ) return;
  const ansEl = document.getElementById("answer");
  const btn = document.getElementById("toggleAns");
  if (ansEl.style.display === "none" || ansEl.style.display === "") {
    ansEl.textContent = currentQ.a;
    ansEl.style.display = "block";
    btn.textContent = "隐藏答案";
  } else {
    ansEl.style.display = "none";
    btn.textContent = "显示答案";
  }
});

// ====================== 统计 ======================
function updateStats() {
  document.getElementById("total").textContent = stats.total;
  document.getElementById("correct").textContent = stats.correct;
  document.getElementById("wrong").textContent = stats.wrong;
}
document.getElementById("markCorrect").addEventListener("click", () => {
  if (!currentQ) return;
  stats.correct++; updateStats();
});
document.getElementById("markIncorrect").addEventListener("click", () => {
  if (!currentQ) return;
  stats.wrong++; updateStats();
});

// ====================== 错题本 ======================
function renderWrong() {
  const box = document.getElementById("wrongList");
  if (wrongList.length === 0) {
    box.innerHTML = "暂无错题";
    return;
  }
  box.innerHTML = wrongList.map((item, i) =>
    `<div class="wrong-item">${i + 1}. ${item}</div>`
  ).join("");
}
document.getElementById("collectWrong").addEventListener("click", () => {
  if (!currentQ) return;
  if (!wrongList.includes(currentQ.q)) {
    wrongList.push(currentQ.q);
    localStorage.setItem("wrongList", JSON.stringify(wrongList));
    renderWrong();
  }
});
document.getElementById("clearWrong").addEventListener("click", () => {
  wrongList = [];
  localStorage.removeItem("wrongList");
  renderWrong();
});
renderWrong();

// ====================== 番茄钟 ======================
let timerInterval;
let timeLeft = 25 * 60;
function renderTimer() {
  const m = Math.floor(timeLeft / 60).toString().padStart(2, "0");
  const s = (timeLeft % 60).toString().padStart(2, "0");
  document.getElementById("timer").textContent = `${m}:${s}`;
}
document.getElementById("startTimer").addEventListener("click", () => {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    renderTimer();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      alert("25分钟专注完成！休息一下吧 ☕");
    }
  }, 1000);
});
document.getElementById("resetTimer").addEventListener("click", () => {
  clearInterval(timerInterval);
  timeLeft = 25 * 60;
  renderTimer();
});
renderTimer();

// ====================== 日夜模式 ======================
const btn = document.getElementById('themeBtn');
btn.addEventListener('click', () => {
  const isDark = document.documentElement.dataset.theme === 'dark';
  if (isDark) {
    document.documentElement.dataset.theme = '';
    btn.textContent = '夜间模式';
  } else {
    document.documentElement.dataset.theme = 'dark';
    btn.textContent = '日间模式';
  }
});

// ====================== 搜索 ======================
const search = document.getElementById('search');
search.addEventListener('input', e => {
  const val = e.target.value.toLowerCase();
  document.querySelectorAll('.item').forEach(i => {
    const txt = i.textContent.toLowerCase();
    i.style.display = txt.includes(val) ? 'block' : 'none';
  });
});
</script>

</body>
</html>
